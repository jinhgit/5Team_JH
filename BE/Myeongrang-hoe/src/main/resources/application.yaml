spring:
  application:
    name: Myeongrang-hoe
  datasource:
    # 드라이버는 URL에서 자동 감지된다 (H2/Postgres 겸용).
    # Railway Postgres: DB_URL=jdbc:postgresql://호스트:포트/DB명 + DB_USERNAME/DB_PASSWORD
    url: ${DB_URL:jdbc:h2:file:./data/myeongrang;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.ssl.trust: ${MAIL_HOST:smtp.gmail.com}
      mail.smtp.connectiontimeout: 8000
      mail.smtp.timeout: 8000
      mail.smtp.writetimeout: 8000
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 4MB

server:
  port: ${SERVER_PORT:8080}

# 실제 SMTP: 환경변수 MAIL_USERNAME / MAIL_PASSWORD (Gmail 앱 비밀번호 권장)
# MAIL_FROM 미설정 시 username 을 발신자로 사용합니다.
app:
  upload:
    dir: ${UPLOAD_DIR:./data/uploads}
  mail:
    from: ${MAIL_FROM:}
    # 메일 미전송(자격증명 없음/실패)일 때만 응답에 인증번호를 포함
    expose-code-when-undelivered: true
  auth:
    # true 이면 X-User-Email 헤더도 허용 (로컬 개발 편의) — 공개 배포에서는 ALLOW_EMAIL_HEADER=false 로 꺼야 한다
    allow-email-header: ${ALLOW_EMAIL_HEADER:true}
  cors:
    # 쉼표 구분 목록. 프론트 배포 도메인이 바뀌면 CORS_ALLOWED_ORIGINS 환경변수로 덮어쓴다
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173,https://myeongranghoe.up.railway.app}
  kakao:
    # 카카오 Developers > 앱 키 > REST API 키 (정적 지도/대표 이미지용)
    rest-key: ${KAKAO_REST_API_KEY:}


logging:
  level:
    org.hibernate.SQL: warn
    com.example.myeongranghoe: info
